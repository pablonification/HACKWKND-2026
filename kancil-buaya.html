<html lang="ms">

    <meta charset="UTF-8" />

    <title>Kancil & Buaya — Terjemahan Semai</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Noto+Sans+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #fdf6ec;
        --surface: #fff9f0;
        --border: #e8d5b0;
        --text: #2c1e0f;
        --muted: #7a5c3a;
        --accent: #b85c1a;
        --semai: #1a5c3a;
        --semai-bg: #e8f5ee;
        --missing: #9b9b9b;
        --missing-bg: #f5f5f5;
        --highlight: #fff3cd;
        --highlight-border: #f5a623;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Lora', Georgia, serif;
        min-height: 100vh;
        padding: 0;
      }

      header {
        background: var(--text);
        color: #fdf6ec;
        padding: 24px 32px;
        display: flex;
        align-items: center;
        gap: 16px;
        border-bottom: 3px solid var(--accent);
      }

      .header-icon {
        font-size: 2.2rem;
      }

      header h1 {
        font-size: 1.4rem;
        font-weight: 600;
        line-height: 1.3;
      }

      header p {
        font-size: 0.8rem;
        opacity: 0.65;
        font-family: 'Noto Sans Mono', monospace;
        margin-top: 2px;
      }

      .controls {
        display: flex;
        gap: 10px;
        padding: 16px 32px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        align-items: center;
        flex-wrap: wrap;
      }

      .controls label {
        font-size: 0.8rem;
        color: var(--muted);
        font-family: 'Noto Sans Mono', monospace;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-right: 4px;
      }

      .btn {
        padding: 6px 14px;
        border-radius: 20px;
        border: 1.5px solid var(--border);
        background: white;
        cursor: pointer;
        font-size: 0.8rem;
        font-family: 'Noto Sans Mono', monospace;
        color: var(--text);
        transition: all 0.15s;
      }

      .btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .btn.active {
        background: var(--text);
        color: white;
        border-color: var(--text);
      }

      .stats {
        margin-left: auto;
        font-size: 0.75rem;
        font-family: 'Noto Sans Mono', monospace;
        color: var(--muted);
        background: var(--semai-bg);
        padding: 4px 12px;
        border-radius: 20px;
        border: 1px solid #c5e0cf;
      }

      .stats span {
        color: var(--semai);
        font-weight: 600;
      }

      .main {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
        min-height: calc(100vh - 130px);
      }

      .panel {
        padding: 32px;
        border-right: 1px solid var(--border);
        overflow-y: auto;
      }

      .panel:last-child {
        border-right: none;
      }

      .panel-title {
        font-size: 0.7rem;
        font-family: 'Noto Sans Mono', monospace;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .panel-title::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .fable-text {
        font-size: 1.05rem;
        line-height: 2.2;
        color: var(--text);
      }

      .word-token {
        display: inline;
        cursor: pointer;
        border-radius: 3px;
        transition: background 0.1s;
        padding: 1px 2px;
        position: relative;
      }

      .word-token.has-translation {
        border-bottom: 2px solid transparent;
      }

      .word-token.has-translation:hover,
      .word-token.has-translation.selected {
        background: var(--highlight);
        border-bottom-color: var(--highlight-border);
      }

      .word-token.no-translation {
        color: var(--missing);
        border-bottom: 2px dotted #ccc;
      }

      .word-token.no-translation:hover,
      .word-token.no-translation.selected {
        background: var(--missing-bg);
        border-bottom-color: #aaa;
      }

      /* Semai panel word tokens */
      .semai-word {
        display: inline;
        padding: 1px 2px;
        border-radius: 3px;
        transition: background 0.1s;
        cursor: pointer;
      }

      .semai-word.translated {
        color: var(--semai);
        font-weight: 600;
      }

      .semai-word.translated:hover,
      .semai-word.translated.selected {
        background: var(--semai-bg);
      }

      .semai-word.untranslated {
        color: var(--missing);
        font-style: italic;
      }

      .semai-word.untranslated:hover,
      .semai-word.untranslated.selected {
        background: var(--missing-bg);
      }

      .tooltip-panel {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--text);
        color: #fdf6ec;
        padding: 12px 24px;
        border-radius: 10px;
        font-size: 0.9rem;
        display: flex;
        gap: 16px;
        align-items: center;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25);
        z-index: 100;
        opacity: 0;
        transition: opacity 0.2s;
        pointer-events: none;
        max-width: 480px;
      }

      .tooltip-panel.visible {
        opacity: 1;
      }

      .tooltip-ms {
        font-size: 0.8rem;
        opacity: 0.65;
      }
      .tooltip-arrow {
        opacity: 0.5;
        font-size: 0.8rem;
      }
      .tooltip-semai {
        color: #7ef5b8;
        font-size: 1.1rem;
        font-weight: 600;
        font-family: 'Noto Sans Mono', monospace;
      }
      .tooltip-none {
        color: #f5a77e;
        font-size: 0.85rem;
      }

      .legend {
        display: flex;
        gap: 16px;
        align-items: center;
        font-size: 0.75rem;
        font-family: 'Noto Sans Mono', monospace;
        color: var(--muted);
        flex-wrap: wrap;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
      }

      .dot-found {
        background: var(--semai);
      }
      .dot-missing {
        background: var(--missing);
      }

      @media (max-width: 720px) {
        .main {
          grid-template-columns: 1fr;
        }
        .panel {
          border-right: none;
          border-bottom: 1px solid var(--border);
        }
      }
    </style>
  </head>

      <div>
        <h1>Kancil dan Buaya — Terjemahan Semai</h1>

    <div class="controls">

        <button class="btn" id="btn-semai" onclick="setMode('semai')">Semai Sahaja</button>
        <button class="btn" id="btn-interlinear" onclick="setMode('interlinear')">

      <div class="stats" id="stats-badge">Mengira...</div>

      function setMode(m) {
        mode = m;
        ['split', 'semai', 'interlinear'].forEach((x) => {
          document.getElementById('btn-' + x).classList.toggle('active', x === m);
        });
        render();
      }

      function render() {
        const msContainer = document.getElementById('ms-text');
        const semaiContainer = document.getElementById('semai-text');
        const main = document.getElementById('main-container');

        if (mode === 'interlinear') {
          main.style.gridTemplateColumns = '1fr';
          document.getElementById('panel-ms').style.display = 'none';
          document.getElementById('panel-semai').style.display = 'block';
          renderInterlinear(semaiContainer);
          return;
        }

        document.getElementById('panel-ms').style.display = 'block';
        document.getElementById('panel-semai').style.display = 'block';

        if (mode === 'split') {
          main.style.gridTemplateColumns = '1fr 1fr';
          renderMS(msContainer);
          renderSemai(semaiContainer);
        } else {
          main.style.gridTemplateColumns = '1fr';
          document.getElementById('panel-ms').style.display = 'none';
          renderSemai(semaiContainer);
        }
      }

      function renderMS(container) {
        let html = '';
        let wordIdx = 0;
        TOKENS.forEach((tok) => {
          if (tok.type === 'space') {
            html += ' ';
          } else if (tok.type === 'newline') {
            html += '<br>';
          } else if (tok.type === 'punct') {
            html += escHtml(tok.text);
          } else if (tok.type === 'word') {
            const idx = wordIdx++;
            const cls = tok.semai ? 'word-token has-translation' : 'word-token no-translation';
            html += `<span class="${cls}" data-idx="${idx}" data-ms="${escAttr(tok.ms)}" data-semai="${escAttr(tok.semai || '')}" onclick="selectWord(${idx}, '${escAttr(tok.ms)}', '${escAttr(tok.semai || '')}')">${escHtml(tok.ms)}</span>`;
          }
        });
        container.innerHTML = html;
      }

      function renderSemai(container) {
        let html = '';
        let wordIdx = 0;
        TOKENS.forEach((tok) => {
          if (tok.type === 'space') {
            html += ' ';
          } else if (tok.type === 'newline') {
            html += '<br>';
          } else if (tok.type === 'punct') {
            html += escHtml(tok.text);
          } else if (tok.type === 'word') {
            const idx = wordIdx++;
            const display = tok.semai || tok.ms;
            const cls = tok.semai ? 'semai-word translated' : 'semai-word untranslated';
            html += `<span class="${cls}" data-idx="${idx}" onclick="selectWord(${idx}, '${escAttr(tok.ms)}', '${escAttr(tok.semai || '')}')">${escHtml(display)}</span>`;
          }
        });
        container.innerHTML = html;
      }

      function renderInterlinear(container) {
        let html = '<div style="font-size:0.95rem; line-height:1.3;">';
        let wordIdx = 0;
        let lineBuffer = '';
        let inPara = false;

        TOKENS.forEach((tok, i) => {
          if (tok.type === 'newline') {
            if (lineBuffer) {
              html += lineBuffer + '<br>';
              lineBuffer = '';
            }
            html += '<br>';
            return;
          }
          if (tok.type === 'space') {
            lineBuffer += ' ';
            return;
          }
          if (tok.type === 'punct') {
            lineBuffer += escHtml(tok.text);
            return;
          }
          if (tok.type === 'word') {
            const idx = wordIdx++;
            const msDisplay = tok.ms;
            const semDisplay = tok.semai || '—';
            const color = tok.semai ? 'var(--semai)' : 'var(--missing)';
            lineBuffer +=
              `<span style="display:inline-block; text-align:center; margin:2px 1px; cursor:pointer; padding:2px 3px; border-radius:3px;" onclick="selectWord(${idx}, '${escAttr(tok.ms)}', '${escAttr(tok.semai || '')}')">` +
              `<span style="display:block; font-size:0.85em; color:var(--muted); line-height:1.1;">${escHtml(msDisplay)}</span>` +
              `<span style="display:block; font-size:0.95em; color:${color}; font-weight:600; font-family:'Noto Sans Mono',monospace; line-height:1.1;">${escHtml(semDisplay)}</span>` +
              `</span>`;
          }
        });
        if (lineBuffer) html += lineBuffer;
        html += '</div>';
        container.innerHTML = html;
      }

      function selectWord(idx, ms, semai) {
        selectedIdx = idx;
        const tt = document.getElementById('tooltip');
        const ttMs = document.getElementById('tt-ms');
        const ttSemai = document.getElementById('tt-semai');
        const ttNone = document.getElementById('tt-none');

        ttMs.textContent = ms;
        if (semai) {
          ttSemai.textContent = semai;
          ttSemai.style.display = '';
          ttNone.style.display = 'none';
          document.querySelector('.tooltip-arrow').style.display = '';
        } else {
          ttSemai.style.display = 'none';
          document.querySelector('.tooltip-arrow').style.display = 'none';
          ttNone.textContent = 'tiada dalam kamus';
          ttNone.style.display = '';
        }

        tt.classList.add('visible');
        clearTimeout(tooltipTimer);
        tooltipTimer = setTimeout(() => tt.classList.remove('visible'), 3500);
      }

      function escHtml(s) {
        if (!s) return '';
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }
      function escAttr(s) {
        if (!s) return '';
        return s.replace(/'/g, "\\'");
      }

      // Stats
      const wordTokens = TOKENS.filter((t) => t.type === 'word');
      const translated = wordTokens.filter((t) => t.semai).length;
      document.getElementById('stats-badge').innerHTML =
        `<span>${translated}</span>/${wordTokens.length} kata diterjemah`;

      render();
    </script>
  </body>
</html>
