<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#fff9e9" />
    <title>Taleka</title>
    <link rel="icon" type="image/svg+xml" href="/assets/icon.svg" />
    <style>
      html,
      body,
      #root {
        background: #fff9e9;
        height: 100%;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <!-- Preload overlay: prevents cream flash between native splash and React mount.
         Removed by AppSplashScreen on mount. Inline style = renders on first paint. -->
    <div id="splash-preload" style="position: fixed; inset: 0; z-index: 100000; background: #fff9e9">
      <img
        src="/assets/splash/figma-splash-logo.png"
        alt=""
        aria-hidden="true"
        style="position: absolute; left: 50%; top: calc(50% - 10.5px); transform: translate(-50%, -50%); width: clamp(140px, 40.7vw, 176px);"
      />
      <img
        src="/assets/splash/generated-splash-footer.png"
        alt=""
        aria-hidden="true"
        style="position: absolute; left: 50%; bottom: calc(env(safe-area-inset-bottom, 0px) + 63px); transform: translateX(-50%); width: clamp(122px, 35.4vw, 152px);"
      />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
