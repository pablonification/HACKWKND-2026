<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <title>Taleka</title>
    <link rel="icon" type="image/svg+xml" href="/assets/icon.svg" />

  <body>
    <!-- Preload overlay: prevents cream flash between native splash and React mount.
         Removed by AppSplashScreen on mount. Inline style = renders on first paint. -->
    <div
      id="splash-preload"
      style="position: fixed; inset: 0; z-index: 100000; background: #fff9e9"
    ></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
