<!doctype html>
<html>
  <head>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&display=swap"
      rel="stylesheet"
    />
    <style>
      .taleka-wordmark {
        --taleka-wordmark-scale: 1;
        color: #060606;
        display: flex;
        align-items: baseline;
        justify-content: center;
      }

      .taleka-wordmark-initial,
      .taleka-wordmark-rest {
        display: block;
        font-family: 'Playfair Display', Georgia, serif;
        font-style: italic;
        font-weight: 600;
        line-height: 1;
        white-space: nowrap;
      }

      .taleka-wordmark-initial {
        font-size: calc(114px * var(--taleka-wordmark-scale));
      }

      .taleka-wordmark-rest {
        font-size: calc(64px * var(--taleka-wordmark-scale));
        margin-left: calc(-24px * var(--taleka-wordmark-scale)); /* pull it under the T */
      }
    </style>
  </head>
  <body style="background: #fff9e9">
    <div class="taleka-wordmark">
      <span class="taleka-wordmark-initial">T</span>
      <span class="taleka-wordmark-rest">aleka</span>
    </div>
  </body>
</html>
