<html lang="ms">

    <title>Puteri Santubong & Sejinjang — Terjemahan Semai</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Noto+Sans+Mono:wght@400;600&family=Lora:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f5f0f8;
        --surface: #faf7fc;
        --border: #d8c8e8;
        --text: #1e0f33;
        --muted: #7a6090;
        --accent: #8b3fa8;
        --semai: #1a6e4a;
        --semai-bg: #e5f5ec;
        --missing: #a0a0b0;
        --missing-bg: #f3f3f6;
        --highlight: #f3e8ff;
        --highlight-border: #b87de0;
        --gold: #b8860b;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Lora', Georgia, serif;
        min-height: 100vh;
      }

      header {
        background: linear-gradient(135deg, #1e0f33 0%, #3d1a5e 100%);
        color: #f5f0f8;
        padding: 22px 32px;
        display: flex;
        align-items: center;
        gap: 16px;
        border-bottom: 3px solid var(--gold);
      }

      .header-icon {
        font-size: 2rem;
      }

      header h1 {
        font-family: 'Playfair Display', serif;
        font-size: 1.3rem;
        font-weight: 700;
        line-height: 1.3;
        font-style: italic;
      }

      header p {
        font-size: 0.75rem;
        opacity: 0.6;
        font-family: 'Noto Sans Mono', monospace;
        margin-top: 3px;
      }

      .controls {
        display: flex;
        gap: 10px;
        padding: 14px 32px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        align-items: center;
        flex-wrap: wrap;
      }

      .controls label {
        font-size: 0.75rem;
        color: var(--muted);
        font-family: 'Noto Sans Mono', monospace;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .btn {
        padding: 5px 13px;
        border-radius: 20px;
        border: 1.5px solid var(--border);
        background: white;
        cursor: pointer;
        font-size: 0.78rem;
        font-family: 'Noto Sans Mono', monospace;
        color: var(--text);
        transition: all 0.15s;
      }

      .btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .btn.active {
        background: #1e0f33;
        color: white;
        border-color: #1e0f33;
      }

      .stats {
        margin-left: auto;
        font-size: 0.73rem;
        font-family: 'Noto Sans Mono', monospace;
        color: var(--muted);
        background: var(--semai-bg);
        padding: 4px 12px;
        border-radius: 20px;
        border: 1px solid #b8ddc8;
      }

      .stats span {
        color: var(--semai);
        font-weight: 600;
      }

      .main {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
        min-height: calc(100vh - 110px);
      }

      .panel {
        padding: 28px 32px;
        border-right: 1px solid var(--border);
        overflow-y: auto;
      }

      .panel:last-child {
        border-right: none;
      }

      .panel-title {
        font-size: 0.68rem;
        font-family: 'Noto Sans Mono', monospace;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
        margin-bottom: 18px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .panel-title::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .fable-text {
        font-size: 1rem;
        line-height: 2.1;
        color: var(--text);
      }

      .story-title {
        font-family: 'Playfair Display', serif;
        font-size: 1.15rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        display: inline;
      }

      .word-token {
        display: inline;
        cursor: pointer;
        border-radius: 3px;
        transition: background 0.1s;
        padding: 1px 2px;
      }

      .word-token.has-translation {
        border-bottom: 2px solid transparent;
      }

      .word-token.has-translation:hover,
      .word-token.has-translation.selected {
        background: var(--highlight);
        border-bottom-color: var(--highlight-border);
      }

      .word-token.no-translation {
        color: var(--missing);
        border-bottom: 2px dotted #c8c8d8;
      }

      .word-token.no-translation:hover,
      .word-token.no-translation.selected {
        background: var(--missing-bg);
        border-bottom-color: #aaaac0;
      }

      .semai-word {
        display: inline;
        padding: 1px 2px;
        border-radius: 3px;
        transition: background 0.1s;
        cursor: pointer;
      }

      .semai-word.translated {
        color: var(--semai);
        font-weight: 600;
      }

      .semai-word.translated:hover,
      .semai-word.translated.selected {
        background: var(--semai-bg);
      }

      .semai-word.untranslated {
        color: var(--missing);
        font-style: italic;
      }

      .semai-word.untranslated:hover,
      .semai-word.untranslated.selected {
        background: var(--missing-bg);
      }

      .tooltip-panel {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #1e0f33;
        color: #f5f0f8;
        padding: 10px 22px;
        border-radius: 10px;
        font-size: 0.88rem;
        display: flex;
        gap: 14px;
        align-items: center;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        z-index: 100;
        opacity: 0;
        transition: opacity 0.2s;
        pointer-events: none;
        max-width: 480px;
        border-top: 2px solid var(--gold);
      }

      .tooltip-panel.visible {
        opacity: 1;
      }

      .tooltip-ms {
        font-size: 0.78rem;
        opacity: 0.6;
      }
      .tooltip-arrow {
        opacity: 0.45;
        font-size: 0.78rem;
      }
      .tooltip-semai {
        color: #78f0b0;
        font-size: 1.05rem;
        font-weight: 600;
        font-family: 'Noto Sans Mono', monospace;
      }
      .tooltip-none {
        color: #f5a07e;
        font-size: 0.82rem;
      }

      .legend {
        display: flex;
        gap: 16px;
        align-items: center;
        font-size: 0.73rem;
        font-family: 'Noto Sans Mono', monospace;
        color: var(--muted);
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        display: inline-block;
      }
      .dot-found {
        background: var(--semai);
      }
      .dot-missing {
        background: var(--missing);
      }

      @media (max-width: 720px) {
        .main {
          grid-template-columns: 1fr;
        }
        .panel {
          border-right: none;
          border-bottom: 1px solid var(--border);
        }
      }
    </style>
  </head>

      <div>
        <h1>Puteri Santubong & Puteri Sejinjang</h1>
        <p>Bahasa Melayu → Bahasa Semai · Kamus Webonary · 73.9% liputan kata</p>

    <div class="controls">

      <div style="display: flex; gap: 8px; align-items: center; margin-left: 16px">
        <label>Paparan:</label>

        <button class="btn" id="btn-semai" onclick="setMode('semai')">Semai Sahaja</button>
        <button class="btn" id="btn-interlinear" onclick="setMode('interlinear')">

      <div class="stats" id="stats-badge">Mengira...</div>
    </div>

      <span class="tooltip-arrow">→</span>

      let mode = 'split';
      let tooltipTimer = null;

      function setMode(m) {
        mode = m;
        ['split', 'semai', 'interlinear'].forEach((x) => {
          document.getElementById('btn-' + x).classList.toggle('active', x === m);
        });
        render();
      }

      function render() {
        const msContainer = document.getElementById('ms-text');
        const semaiContainer = document.getElementById('semai-text');
        const main = document.getElementById('main-container');

        if (mode === 'interlinear') {
          main.style.gridTemplateColumns = '1fr';
          document.getElementById('panel-ms').style.display = 'none';
          document.getElementById('panel-semai').style.display = 'block';
          renderInterlinear(semaiContainer);
          return;
        }

        document.getElementById('panel-ms').style.display = 'block';
        document.getElementById('panel-semai').style.display = 'block';

        if (mode === 'split') {
          main.style.gridTemplateColumns = '1fr 1fr';
          renderMS(msContainer);
          renderSemai(semaiContainer);
        } else {
          main.style.gridTemplateColumns = '1fr';
          document.getElementById('panel-ms').style.display = 'none';
          renderSemai(semaiContainer);
        }
      }

      function renderMS(container) {
        let html = '';
        let wordIdx = 0;
        let isFirst = true;
        TOKENS.forEach((tok) => {
          if (tok.type === 'space') {
            html += ' ';
          } else if (tok.type === 'newline') {
            html += '<br>';
          } else if (tok.type === 'punct') {
            html += escHtml(tok.text);
          } else if (tok.type === 'word') {
            const idx = wordIdx++;
            const cls = tok.semai ? 'word-token has-translation' : 'word-token no-translation';
            const isTitle = isFirst && tok.ms === tok.ms.toUpperCase() && tok.ms.length > 1;
            if (isTitle) html += `<span class="story-title">`;
            html += `<span class="${cls}" data-idx="${idx}" onclick="selectWord('${escAttr(tok.ms)}', '${escAttr(tok.semai || '')}')">${escHtml(tok.ms)}</span>`;
            if (isTitle) html += `</span>`;
            isFirst = false;
          }
        });
        container.innerHTML = html;
      }

      function renderSemai(container) {
        let html = '';
        let wordIdx = 0;
        let isFirst = true;
        TOKENS.forEach((tok) => {
          if (tok.type === 'space') {
            html += ' ';
          } else if (tok.type === 'newline') {
            html += '<br>';
          } else if (tok.type === 'punct') {
            html += escHtml(tok.text);
          } else if (tok.type === 'word') {
            const idx = wordIdx++;
            const display = tok.semai || tok.ms;
            const cls = tok.semai ? 'semai-word translated' : 'semai-word untranslated';
            const isTitle = isFirst && tok.ms === tok.ms.toUpperCase() && tok.ms.length > 1;
            if (isTitle) html += `<span class="story-title">`;
            html += `<span class="${cls}" onclick="selectWord('${escAttr(tok.ms)}', '${escAttr(tok.semai || '')}')">${escHtml(display)}</span>`;
            if (isTitle) html += `</span>`;
            isFirst = false;
          }
        });
        container.innerHTML = html;
      }

      function renderInterlinear(container) {
        let html = '<div style="font-size:0.9rem; line-height:1.4;">';
        let wordIdx = 0;
        TOKENS.forEach((tok) => {
          if (tok.type === 'newline') {
            html += '<br>';
            return;
          }
          if (tok.type === 'space') {
            html += ' ';
            return;
          }
          if (tok.type === 'punct') {
            html += escHtml(tok.text);
            return;
          }
          if (tok.type === 'word') {
            const idx = wordIdx++;
            const semDisplay = tok.semai || '—';
            const color = tok.semai ? 'var(--semai)' : 'var(--missing)';
            html +=
              `<span style="display:inline-block; text-align:center; margin:2px 1px; cursor:pointer; padding:2px 3px; border-radius:3px;" onclick="selectWord('${escAttr(tok.ms)}', '${escAttr(tok.semai || '')}')">` +
              `<span style="display:block; font-size:0.78em; color:var(--muted); line-height:1.1;">${escHtml(tok.ms)}</span>` +
              `<span style="display:block; font-size:0.9em; color:${color}; font-weight:600; font-family:'Noto Sans Mono',monospace; line-height:1.1;">${escHtml(semDisplay)}</span>` +
              `</span>`;
          }
        });
        html += '</div>';
        container.innerHTML = html;
      }

      function selectWord(ms, semai) {
        const tt = document.getElementById('tooltip');
        document.getElementById('tt-ms').textContent = ms;
        if (semai) {
          document.getElementById('tt-semai').textContent = semai;
          document.getElementById('tt-semai').style.display = '';
          document.querySelector('.tooltip-arrow').style.display = '';
          document.getElementById('tt-none').style.display = 'none';
        } else {
          document.getElementById('tt-semai').style.display = 'none';
          document.querySelector('.tooltip-arrow').style.display = 'none';
          document.getElementById('tt-none').textContent = 'tiada dalam kamus';
          document.getElementById('tt-none').style.display = '';
        }
        tt.classList.add('visible');
        clearTimeout(tooltipTimer);
        tooltipTimer = setTimeout(() => tt.classList.remove('visible'), 3500);
      }

      function escHtml(s) {
        if (!s) return '';
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }
      function escAttr(s) {
        if (!s) return '';
        return s.replace(/'/g, "\\'").replace(/\n/g, '');
      }

      const wordTokens = TOKENS.filter((t) => t.type === 'word');
      const translated = wordTokens.filter((t) => t.semai).length;
      document.getElementById('stats-badge').innerHTML =
        `<span>${translated}</span>/${wordTokens.length} kata diterjemah`;

      render();
    </script>
